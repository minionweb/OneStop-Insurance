<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Portal – Review & Confirm</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="assets/logo.svg" alt="Company logo" width="32" height="32" />
        <span class="brand-name">OneStop Insurance Protection</span>
      </div>
      <div class="user-menu" id="userMenu" aria-label="User menu">
  <button class="user-button" id="userButton" aria-haspopup="true" aria-expanded="false">
    <span class="user-avatar" aria-hidden="true">A</span>
    <span class="user-email" id="userEmail">agent@example.com</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="menu" id="userMenuList" role="menu">
    <div class="section">Account</div>
    <button role="menuitem" onclick="window.location.href='profile.html'">Profile</button>
    <button role="menuitem" onclick="window.location.href='settings.html'">Settings</button>
    <button role="menuitem" onclick="window.location.href='plans.html'">Plan details</button>
    <div class="divider"></div>
    <button role="menuitem" id="signOutBtn">Sign out</button>
  </div>
</div>
    </div>
  </header>
<main class="container">
  <h1>Review & Confirm</h1>
  <p class="small muted">Please verify the details below before confirming.</p>
  <section class="review-grid">
    <article class="card"><h2>Plan</h2><div class="review-row"><div class="review-label">Selected Plan</div><div class="review-value" id="rev_plan"></div></div></article>
    <article class="card"><h2>Customer Details</h2>
	 <div class="two">
      <div class="review-row"><div class="review-label">First Name</div><div class="review-value" id="rev_first"></div></div>
	  </div>
      <div class="review-row"><div class="review-label">Last Name</div><div class="review-value" id="rev_last"></div></div>
      <div class="review-row"><div class="review-label">Email</div><div class="review-value" id="rev_email"></div></div>
      <div class="review-row"><div class="review-label">Phone</div><div class="review-value" id="rev_phone"></div></div>
    </article>
    <article class="card"><h2>Billing Address</h2>
      <div class="review-row"><div class="review-label">Address Line 1</div><div class="review-value" id="rev_addr1"></div></div>
      <div class="review-row"><div class="review-label">Address Line 2</div><div class="review-value" id="rev_addr2"></div></div>
      <div class="review-row"><div class="review-label">City</div><div class="review-value" id="rev_city"></div></div>
      <div class="review-row"><div class="review-label">State</div><div class="review-value" id="rev_state"></div></div>
      <div class="review-row"><div class="review-label">Zip Code</div><div class="review-value" id="rev_zip"></div></div>
    </article>
    <article class="card"><h2>Payment</h2>
      <div class="review-row"><div class="review-label">Name on Card</div><div class="review-value" id="rev_ccname"></div></div>
      <div class="review-row"><div class="review-label">Card</div><div class="review-value" id="rev_cc"></div></div>
      <div class="review-row"><div class="review-label">Expiration</div><div class="review-value" id="rev_exp"></div></div>
    </article>
    <div class="actions"><a class="btn btn-secondary" href="plans.html">Back</a><button class="btn" id="confirmBtn">Confirm & Enroll</button></div>
  </section>
</main>
<script>
  const raw=sessionStorage.getItem('appData'); let data={}; try{data=JSON.parse(raw||'{}')}catch{data={}};
  const set=(id,val)=>{const el=document.getElementById(id); if(el) el.textContent=val||''};
  set('rev_plan', data.planTitle||data.plan||'—'); set('rev_first',data.customer?.first); set('rev_last',data.customer?.last); set('rev_email',data.customer?.email); set('rev_phone',data.customer?.phone);
  set('rev_addr1',data.billing?.addr1); set('rev_addr2',data.billing?.addr2); set('rev_city',data.billing?.city); set('rev_state',data.billing?.state); set('rev_zip',data.billing?.zip);
  set('rev_ccname',data.payment?.name); set('rev_cc',data.payment?.masked); set('rev_exp',data.payment?.exp);
  document.getElementById('confirmBtn').addEventListener('click',()=>{ window.location.href='confirm.html'; });
</script>

<script>
  const email = sessionStorage.getItem("demoUser") || "agent@example.com";
  const emailEl = document.getElementById("userEmail"); if (emailEl) emailEl.textContent = email;
  const avatar = document.querySelector(".user-avatar"); if (avatar) avatar.textContent = (email[0]||"A").toUpperCase();
  const btn=document.getElementById("userButton"); const menu=document.getElementById("userMenuList");
  btn.addEventListener("click",()=>{ const open=menu.classList.toggle("open"); btn.setAttribute("aria-expanded", String(open)); });
  document.addEventListener("click",(e)=>{ if(!e.target.closest(".user-menu")){ menu.classList.remove("open"); btn.setAttribute("aria-expanded","false"); } });
  const so=document.getElementById("signOutBtn"); if(so){ so.addEventListener("click",()=>{ sessionStorage.removeItem("demoUser"); window.location.href="index.html"; }); }
</script>

</body>
</html>
