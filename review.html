<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OneStop – Review & Confirm</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f172a; --muted: #6b7280; --bg-row: #f7f9fc; --border-soft: #eef2f7;
      --plan-accent:#4f46e5; --cust-accent:#0ea5e9; --bill-accent:#22c55e; --pay-accent:#f59e0b;
      --pad-x:.75rem; --pad-y:.50rem; --radius:10px; --label-width:180px;
    }
    body { margin:0; background:#f6f7fb; font-family:Inter,system-ui,sans-serif; color:var(--ink);}    
    .container{max-width:960px;margin:0 auto;padding:0 1rem}
    .site-header{background:#fff;border-bottom:1px solid #e5e7eb}
    .header-inner{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
    .brand{display:flex;align-items:center;gap:.5rem;font-weight:700}
    .user-menu{position:relative}
    .user-button{display:flex;gap:.5rem;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:9999px;padding:.4rem .75rem;cursor:pointer}
    .user-avatar{width:28px;height:28px;border-radius:50%;background:#e6efff;color:#0f62fe;display:flex;align-items:center;justify-content:center;font-weight:700}
    .menu{display:none;position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid #e5e7eb;border-radius:8px;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    .menu.open{display:block}
    .menu button{width:100%;background:none;border:none;text-align:left;padding:.6rem .75rem;cursor:pointer}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:var(--radius);padding:1rem;margin-top:1rem;box-shadow:0 6px 24px rgba(16,24,40,.06)}
    h2{position:relative;padding-left:.75rem;margin:1rem 0 .5rem}
    h2::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:4px;border-radius:3px;background:#0ea5e9}
    h2[data-accent="plan"]::before{background:var(--plan-accent)}
    h2[data-accent="customer"]::before{background:var(--cust-accent)}
    h2[data-accent="billing"]::before{background:var(--bill-accent)}
    h2[data-accent="payment"]::before{background:var(--pay-accent)}
    .kv>div{display:flex;gap:.5rem;align-items:baseline;background:var(--bg-row);border:1px solid var(--border-soft);border-radius:6px;padding:var(--pad-y) var(--pad-x);margin:.25rem 0}
    .kv dt{flex:0 0 var(--label-width);font-weight:600}
    .kv dt::after{content:":";margin-left:.25rem;color:var(--muted)}
    .actions{margin-top:1rem;display:flex;justify-content:space-between}
    .btn{padding:.65rem 1rem;font-weight:600;border-radius:.55rem;cursor:pointer;border:none}
    .btn-secondary{background:#fff;color:#0f62fe;border:1px solid #0f62fe}
    .btn-primary{background:#0f62fe;color:#fff}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="assets/logo.svg" alt="Company logo" width="32" height="32" />
        <span class="brand-name">OneStop Insurance</span>
      </div>
      <div class="user-menu" id="userMenu" aria-label="User menu">
  <button class="user-button" id="userButton" aria-haspopup="true" aria-expanded="false">
    <span class="user-avatar" aria-hidden="true">A</span>
    <span class="user-email" id="userEmail">agent@example.com</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="menu" id="userMenuList" role="menu">
    <div class="section">  </div>
    <button role="menuitem" onclick="window.location.href='profile.html'">Profile</button>
    <button role="menuitem" onclick="window.location.href='settings.html'">Settings</button>
    <button role="menuitem" onclick="window.location.href='plans.html'">Plan details</button>
    <div class="divider"></div>
    <button role="menuitem" id="signOutBtn">Sign out</button>
  </div>
</div>
    </div>
  </header>

<main class="container">
  <h1>Review & Confirm</h1>
  <p class="small muted">Please verify the details below before confirming.</p>

  <section class="card">
    <h3 data-accent="plan">Plan</h3>
    <dl class="kv"><div><dt>Selected Plan</dt><dd id="rev_plan"></dd></div></dl>

    <h3  data-accent="customer">Customer</h3>
    <dl class="kv">
      <div><dt>First Name</dt><dd id="rev_first"></dd></div>
      <div><dt>Last Name</dt><dd id="rev_last"></dd></div>
      <div><dt>Email</dt><dd id="rev_email"></dd></div>
      <div><dt>Phone</dt><dd id="rev_phone"></dd></div>
    </dl>

    <h3 data-accent="billing">Billing</h3>
    <dl class="kv">
      <div><dt>Address 1</dt><dd id="rev_addr1"></dd></div>
      <div><dt>Address 2</dt><dd id="rev_addr2"></dd></div>
      <div><dt>City</dt><dd id="rev_city"></dd></div>
      <div><dt>State</dt><dd id="rev_state"></dd></div>
      <div><dt>Zip</dt><dd id="rev_zip"></dd></div>
    </dl>

    <h3 data-accent="payment">Payment</h3>
    <dl class="kv">
      <div><dt>Name on Card</dt><dd id="rev_ccname"></dd></div>
      <div><dt>Card</dt><dd id="rev_cc"></dd></div>
      <div><dt>Expiration</dt><dd id="rev_exp"></dd></div>
    </dl>

    <div class="actions">
      <button class="btn btn-secondary" id="backBtn">Back</button>
      <button class="btn btn-primary" id="confirmBtn">Confirm & Enroll</button>
    </div>
  </section>
</main>

<script>
  document.getElementById('backBtn').onclick = () => window.location.href='plans.html';
  document.getElementById('confirmBtn').onclick = () => window.location.href='confirm.html';
  document.getElementById('signOutBtn').onclick = () => { sessionStorage.removeItem('demoUser'); window.location.href='index.html'; };

  const data = JSON.parse(sessionStorage.getItem('appData') || '{}');
  const set = (id,val)=>{const el=document.getElementById(id); if(el) el.textContent=val?val:'—';};
  set('rev_plan',data.planTitle||data.plan);
  set('rev_first',data.customer?.first);
  set('rev_last',data.customer?.last);
  set('rev_email',data.customer?.email);
  set('rev_phone',data.customer?.phone);
  set('rev_addr1',data.billing?.addr1);
  set('rev_addr2',data.billing?.addr2);
  set('rev_city',data.billing?.city);
  set('rev_state',data.billing?.state);
  set('rev_zip',data.billing?.zip);
  set('rev_ccname',data.payment?.name);
  set('rev_cc',data.payment?.masked);
  set('rev_exp',data.payment?.exp);
</script>

<script>
  const email = sessionStorage.getItem("demoUser") || "agent@example.com";
  const emailEl = document.getElementById("userEmail"); if (emailEl) emailEl.textContent = email;
  const avatar = document.querySelector(".user-avatar"); if (avatar) avatar.textContent = (email[0]||"A").toUpperCase();
  const btn=document.getElementById("userButton"); const menu=document.getElementById("userMenuList");
  btn.addEventListener("click",()=>{ const open=menu.classList.toggle("open"); btn.setAttribute("aria-expanded", String(open)); });
  document.addEventListener("click",(e)=>{ if(!e.target.closest(".user-menu")){ menu.classList.remove("open"); btn.setAttribute("aria-expanded","false"); } });
  const so=document.getElementById("signOutBtn"); if(so){ so.addEventListener("click",()=>{ sessionStorage.removeItem("demoUser"); window.location.href="index.html"; }); }
</script>
</body>
</html>
