<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="assets/logo.svg" alt="Company logo" width="32" height="32" />
        <span class="brand-name">Acme Protection</span>
      </div>
      <div class="user-menu" id="userMenu" aria-label="User menu">
  <button class="user-button" id="userButton" aria-haspopup="true" aria-expanded="false">
    <span class="user-avatar" aria-hidden="true">A</span>
    <span class="user-email" id="userEmail">agent@example.com</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="menu" id="userMenuList" role="menu">
    <div class="section">Account</div>
    <button role="menuitem" onclick="window.location.href='profile.html'">Profile</button>
    <button role="menuitem" onclick="window.location.href='settings.html'">Settings</button>
    <button role="menuitem" onclick="window.location.href='plans.html'">Plan details</button>
    <div class="divider"></div>
    <button role="menuitem" id="signOutBtn">Sign out</button>
  </div>
</div>
    </div>
  </header>
<main class="container"><section class="card"><h1>Profile</h1><p class="muted small">Demo placeholder page.</p></section></main>

<script>
  const email = sessionStorage.getItem("demoUser") || "agent@example.com";
  const emailEl = document.getElementById("userEmail"); if (emailEl) emailEl.textContent = email;
  const avatar = document.querySelector(".user-avatar"); if (avatar) avatar.textContent = (email[0]||"A").toUpperCase();
  const btn=document.getElementById("userButton"); const menu=document.getElementById("userMenuList");
  btn.addEventListener("click",()=>{ const open=menu.classList.toggle("open"); btn.setAttribute("aria-expanded", String(open)); });
  document.addEventListener("click",(e)=>{ if(!e.target.closest(".user-menu")){ menu.classList.remove("open"); btn.setAttribute("aria-expanded","false"); } });
  const so=document.getElementById("signOutBtn"); if(so){ so.addEventListener("click",()=>{ sessionStorage.removeItem("demoUser"); window.location.href="index.html"; }); }
</script>

</body>
</html>
